# Workspace Configuration Template
# Copy this directory to /workspaces/{client-name}/ for each new client
# Then fill in the values below.

workspace:
  id: ""                          # Lowercase slug, e.g. "acme-corp"
  name: ""                        # Display name, e.g. "Acme Corporation"
  tier: 2                         # 1 = Form-only, 2 = Direct Slack, 3 = Enterprise
  timezone: "America/New_York"    # IANA timezone
  created: ""                     # ISO date, e.g. "2026-04-01"

# Model preferences (inherits from platform defaults if omitted)
models:
  primary: "claude-opus-4-6"
  routine: "claude-sonnet-4-6"

# Channel configuration
channels:
  marketing: "client-{id}-marketing"
  campaigns: "client-{id}-campaigns"
  admin: "client-{id}-admin"
  briefings: "briefings"
  approvals: "approvals"

# Enabled platform skills
skills: []
  # - ad-campaign-research
  # - ad-campaign-generate
  # - research
  # - morning-briefing
  # - sop-detection

# Enabled SOPs
sops: []
  # - ad-campaign
  # - landing-page
  # - email-sequence

# Heartbeat configuration
heartbeat:
  enabled: true
  interval_hours: 2
  business_hours:
    start: "08:00"
    end: "18:00"
  timezone: "America/New_York"

# Morning briefing
briefing:
  enabled: true
  trigger: "presence_or_checkin"

# Secret references (resolved at runtime from Doppler)
secrets:
  # These are references, not values
  - name: ANTHROPIC_AUTH_TOKEN
    scope: platform
  - name: SLACK_BOT_TOKEN
    scope: workspace
  - name: GEMINI_API_KEY
    scope: platform
