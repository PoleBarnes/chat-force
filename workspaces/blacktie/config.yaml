workspace:
  id: blacktie
  name: "BlackTie Post-Frame Buildings"
  tier: 2  # Direct Slack access
  timezone: "America/Chicago"  # Central Time
  created: "2026-04-01"

# Model preferences (inherits from platform, can override)
models:
  primary: "claude-opus-4-6"
  routine: "claude-sonnet-4-6"

# Channel configuration
channels:
  marketing: "client-blacktie-marketing"
  campaigns: "client-blacktie-campaigns"
  admin: "client-blacktie-admin"
  briefings: "briefings"
  approvals: "approvals"

# Enabled platform skills
skills:
  - ad-campaign-research
  - ad-campaign-generate
  - research
  - morning-briefing
  - sop-detection

# Enabled SOPs
sops:
  - ad-campaign
  - landing-page
  - email-sequence

# Heartbeat configuration
heartbeat:
  enabled: true
  interval_hours: 2
  business_hours:
    start: "08:00"
    end: "18:00"
  timezone: "America/Chicago"

# Morning briefing
briefing:
  enabled: true
  trigger: "presence_or_checkin"

# Secret references (resolved at runtime from Doppler)
secrets:
  # These are references, not values
  - name: ANTHROPIC_AUTH_TOKEN
    scope: platform
  - name: SLACK_BOT_TOKEN
    scope: workspace
  - name: GEMINI_API_KEY
    scope: platform
