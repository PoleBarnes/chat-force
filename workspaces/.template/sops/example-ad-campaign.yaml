name: Ad Campaign Workflow
description: >
  End-to-end standard operating procedure for creating and deploying an
  advertising campaign. Covers research, ideation, creative production,
  and deployment with human approval gates before concept lock-in and
  final launch.

inputs:
  product_description:
    type: text
    required: true
    description: A detailed description of the product or service being advertised.

  target_audience:
    type: text
    required: true
    description: Who the campaign is trying to reach (demographics, interests, pain points).

  budget_range:
    type: select
    required: true
    options:
      - "$500-1000"
      - "$1000-2500"
      - "$2500-5000"
      - "$5000+"
    description: Total budget allocated for the campaign.

  tone:
    type: select
    required: true
    options:
      - Professional
      - Casual
      - Bold
      - Luxury
    description: The desired voice and feel of the campaign creative.

  reference_images:
    type: file_upload
    required: false
    description: Optional mood-board or reference images to guide visual direction.

steps:
  - id: research
    agent: openclaw
    description: >
      Analyse the product, target audience, and competitive landscape.
      Summarise key insights, audience segments, and channel
      recommendations that will inform the creative brief.

  - id: ideation
    agent: openclaw
    description: >
      Generate three to five campaign concepts based on the research
      findings. Each concept should include a working title, tagline,
      key message, and suggested channels.

  - id: concept_approval
    type: human_approval
    description: >
      Present the proposed campaign concepts to the stakeholder for
      review. Proceed only after explicit approval of the selected
      concept.

  - id: copy_writing
    agent: openclaw
    description: >
      Write all ad copy for the approved concept, including headlines,
      body text, and calls to action for each target channel.

  - id: image_generation
    agent: "api:flux"
    description: >
      Produce campaign imagery using the Flux image-generation API.
      Generate variants aligned with the approved concept, tone, and
      any supplied reference images.

  - id: landing_page
    agent: claude_code
    description: >
      Build a responsive landing page that houses the campaign creative.
      Include the finalised copy, generated images, and a clear
      conversion funnel.

  - id: deployment_approval
    type: human_approval
    description: >
      Final review of all campaign assets and the landing page.
      Approve to push live or request revisions.
