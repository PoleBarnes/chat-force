# =============================================================================
# SOP Template — Digital Workforce Platform
# =============================================================================
#
# This is the reference template for creating new SOPs. Copy this file,
# rename it, and fill in the sections. The SOP runner at
# orchestrator/graphs/sop_runner.py parses this format and generates a
# LangGraph workflow automatically.
#
# SOPs serve three purposes:
#   1. Executable workflows — the SOP runner turns this into a LangGraph graph
#   2. Web form generation — input_schema auto-generates an intake form
#   3. Version control — track process changes in git
#
# =============================================================================

# ---------------------------------------------------------------------------
# Identity
# ---------------------------------------------------------------------------

# Unique name for the SOP. Use lowercase-kebab-case.
# This becomes the SOP's identifier in the system.
name: sop-name-here

# Increment this when you change the SOP's logic. The runner uses this
# to detect version mismatches on in-progress runs.
version: 1

# Human-readable description of what this SOP does and when to use it.
# Use YAML block scalar (>) for multi-line descriptions.
description: >
  What this SOP does, in 2-3 sentences. Explain the inputs, the process,
  and what gets delivered. This appears in the SOP catalog and help text.

# ---------------------------------------------------------------------------
# Input Schema
# ---------------------------------------------------------------------------
#
# Defines the fields for the web intake form. Each field becomes a form
# element. The SOP runner validates inputs against this schema before
# starting execution.
#
# Supported field types:
#   string       — Single-line text input
#   text         — Multi-line textarea
#   integer      — Number input (supports min, max)
#   select       — Dropdown with predefined options
#   multiselect  — Multi-choice checkboxes or tag selector
#   file_upload  — File upload (supports accept, max_files)
#   boolean      — Checkbox / toggle
#   date         — Date picker
#   url          — URL input with validation
#
# Common field properties:
#   type:        (required) One of the types above
#   required:    true/false — whether the field must be filled
#   label:       Human-readable label shown on the form
#   placeholder: Placeholder text inside the input
#   help:        Help text shown below the field
#   default:     Default value if not provided
#
# Type-specific properties:
#   select/multiselect:
#     options:   Array of allowed values
#   integer:
#     min:       Minimum allowed value
#     max:       Maximum allowed value
#   file_upload:
#     accept:    MIME type filter (e.g., "image/*", ".pdf,.doc")
#     max_files: Maximum number of files
#
input_schema:
  # Required field example
  project_name:
    type: string
    required: true
    label: Project Name
    placeholder: "e.g. Q2 Product Launch"
    help: A short name to identify this project.

  # Text area example
  project_brief:
    type: text
    required: true
    label: Project Brief
    placeholder: "Describe what you need..."
    help: Full description of the project requirements.

  # Select example
  priority:
    type: select
    required: false
    label: Priority
    default: Normal
    options:
      - Low
      - Normal
      - High
      - Urgent

  # Multiselect example
  channels:
    type: multiselect
    required: false
    label: Channels
    options:
      - Email
      - Social
      - Web
      - Print

  # Integer with range
  quantity:
    type: integer
    required: false
    label: Quantity
    default: 1
    min: 1
    max: 100

  # File upload example
  attachments:
    type: file_upload
    required: false
    label: Attachments
    accept: "image/*,.pdf,.doc,.docx"
    max_files: 5
    help: Supporting files, brand assets, or reference material.

# ---------------------------------------------------------------------------
# Steps
# ---------------------------------------------------------------------------
#
# Steps define the workflow. The SOP runner creates a LangGraph node for
# each step and wires edges based on depends_on.
#
# Step properties:
#   id:          (required) Unique identifier, lowercase-kebab-case
#   description: (required) What this step does — be specific enough that
#                an AI agent can execute it without ambiguity
#   specialist:  Which agent type handles this step:
#                  openclaw     — The workspace's OpenClaw agent
#                  claude_code  — Claude Code for file creation / coding tasks
#                  api:service  — Direct API call (e.g., api:gemini, api:imagemagick)
#   type:        "task" (default) or "approval_gate"
#                approval_gate pauses the workflow for human review
#   depends_on:  Array of step IDs that must complete before this step runs.
#                Steps without dependencies (or depending only on completed
#                steps) can run in parallel.
#   agent:       (optional) Specific agent or API to use. Overrides the
#                default for the specialist type.
#   rules:       (optional) Array of constraints or requirements for the step.
#   output_format: (optional) Expected structure of the step's output.
#
# Parallelism:
#   Steps that share the same depends_on (or have no dependencies) run
#   in parallel. Use this to speed up independent work streams.
#
#   Example: steps B and C both depend on A → they run in parallel after A.
#
# Approval Gates:
#   Use type: approval_gate for human review checkpoints. The workflow
#   pauses and presents deliverables for review. The human can approve,
#   request revisions, or reject. Place gates at natural decision points
#   (e.g., after research before generation, after generation before delivery).
#
steps:
  # Task step example
  - id: research
    specialist: openclaw
    description: >
      Research the topic. Gather background material, analyze competitors,
      and identify key themes. Output a structured research brief.
    rules:
      - Include source URLs for all findings
      - Use customer language, not marketing jargon

  # Parallel steps example — both depend on research, so they run together
  - id: draft-copy
    specialist: openclaw
    depends_on: [research]
    description: >
      Write the first draft based on research findings.

  - id: draft-visuals
    specialist: openclaw
    depends_on: [research]
    description: >
      Create visual concepts based on research findings.

  # Approval gate example
  - id: review-drafts
    type: approval_gate
    depends_on: [draft-copy, draft-visuals]
    description: >
      Human reviews both the copy and visual drafts. Approve to proceed
      to final production, request revisions, or reject.

  # Post-approval step
  - id: finalize
    specialist: claude_code
    depends_on: [review-drafts]
    description: >
      Finalize all deliverables based on review feedback. Polish copy,
      refine visuals, and package for delivery.

# ---------------------------------------------------------------------------
# Output Schema
# ---------------------------------------------------------------------------
#
# Defines what the SOP produces when complete. Used for downstream
# integrations and to verify the SOP delivered everything expected.
#
# Each output field has:
#   type:        string, object, array, boolean, integer
#   description: What this output contains
#
output_schema:
  deliverable:
    type: string
    description: The primary deliverable produced by this SOP.

  supporting_materials:
    type: object
    description: Research, drafts, and other supporting materials.

  review_notes:
    type: string
    description: Notes from the approval review.

# ---------------------------------------------------------------------------
# Metadata (optional)
# ---------------------------------------------------------------------------
#
# Additional information about the SOP. Not used by the runner but useful
# for catalog search, documentation, and SOP management.
#
metadata:
  author: Your Name
  created: "2026-04-01"
  category: general          # marketing, engineering, operations, etc.
  estimated_duration: "1 hour"
  tags: [template, example]
