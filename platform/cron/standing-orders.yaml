# Standing Orders
# These are always-on behaviors that Leo follows regardless of specific tasks.
# Think of these as Leo's "background processes."

standing_orders:

  # SOP Detection — watch for repeating patterns
  - id: sop_detection
    description: "Monitor for repeating task patterns and propose SOPs"
    trigger: "after_each_task"
    behavior: |
      After completing a task, check if a similar task type has been performed before.
      If 2+ similar tasks found, propose formalizing as an SOP.
      Don't force patterns prematurely — wait for natural emergence.
    approval_required: true

  # Memory Maintenance — curate long-term memory
  - id: memory_maintenance
    description: "Review recent daily files and update long-term memory"
    trigger: "cron"
    schedule: "0 9 * * 1,3,5"  # Mon/Wed/Fri at 9 AM
    behavior: |
      1. Review daily note files from the past week
      2. Extract durable insights worth keeping long-term
      3. Update MEMORY.md with curated information
      4. Remove outdated information from MEMORY.md
    approval_required: false  # Internal maintenance

  # Project Completion Drive — always push forward
  - id: project_drive
    description: "Track project progress and identify next steps"
    trigger: "after_approval"
    behavior: |
      After a deliverable is approved:
      1. Update project tracker
      2. Identify the next logical step
      3. Confirm plan with human
      4. Proceed if confirmed
      Default: forward momentum. Human can override anytime.
    approval_required: false  # Just continues working

  # Health Check — self-monitoring
  - id: health_check
    description: "Monitor system health and report issues"
    trigger: "cron"
    schedule: "0 */4 * * *"  # Every 4 hours
    behavior: |
      Check:
      - API connectivity (Anthropic, Slack)
      - Doppler secret freshness
      - Disk usage
      - Recent error rates
      - Cost tracking vs. daily limits
      Report anomalies to admin channel.
    approval_required: false
