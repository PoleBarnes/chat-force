# OpenClaw Self-Hosted Docker Compose
# -----------------------------------
# Secrets are injected by Doppler at runtime:
#   doppler run -- docker compose up -d
#
# Config templates in ./config/ are mounted read-only to /templates/.
# The entrypoint copies them to the real config path and substitutes
# environment variables (e.g. ${SLACK_BOT_TOKEN}) with actual values.

services:
  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    restart: unless-stopped
    init: true

    ports:
      - "3001:3001"

    environment:
      NODE_ENV: production
      HOME: /home/openclaw
      TZ: ${TZ:-UTC}

    volumes:
      # Config templates: read-only, entrypoint.sh substitutes env vars
      - ./config/openclaw.json:/templates/openclaw.json:ro
      - ./config/auth-profiles.json:/templates/auth-profiles.json:ro

      # Persistent data and workspace
      - openclaw-data:/home/openclaw/.openclaw/data
      - openclaw-workspace:/home/openclaw/.openclaw/workspace

    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3001/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

    # Harden the container
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true

volumes:
  openclaw-data:
  openclaw-workspace:
