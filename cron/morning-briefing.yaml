# Morning Briefing Configuration
# Triggers when human becomes active or runs /checkin
# Posts a structured summary to help the human start their day

morning_briefing:
  trigger:
    - type: presence_detection
      event: "user_becomes_active"
    - type: command
      command: "/checkin"

  # Don't fire more than once per day
  cooldown: "24h"

  # Briefing sections (in order)
  sections:
    - id: blocked_items
      title: "🚫 Needs Your Decision"
      description: "Items blocked on human input, with response buttons"
      priority: 1

    - id: pending_approvals
      title: "✅ Approvals Waiting"
      description: "Deliverables or mechanic proposals awaiting review"
      priority: 2

    - id: completed_work
      title: "✨ Completed Since Last Check-in"
      description: "Work finished since last briefing"
      priority: 3

    - id: upcoming_work
      title: "📋 Today's Plan"
      description: "What Leo plans to work on today"
      priority: 4

    - id: system_health
      title: "💚 System Health"
      description: "Bot status, cost tracking, any warnings"
      priority: 5

    - id: mechanic_insights
      title: "🔧 Mechanic Notes"
      description: "Recent mechanic analysis highlights (if any)"
      priority: 6
      optional: true
