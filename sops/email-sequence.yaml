# =============================================================================
# Email Drip Sequence SOP — BlackTie Digital Workforce
# =============================================================================
# Creates a complete email drip sequence with HTML templates, A/B subject
# lines, and a coherent narrative arc from introduction to conversion.
#
# Runner: orchestrator/graphs/sop_runner.py
# =============================================================================

name: email-sequence
version: 1
description: >
  Create a multi-email drip sequence that nurtures leads from first
  contact to conversion. Each email is fully designed HTML with inline
  CSS, mobile-responsive, and includes A/B subject line variants.
  The sequence follows a strategic arc customized to the product and
  audience.

# ---------------------------------------------------------------------------
# Input Schema
# ---------------------------------------------------------------------------
input_schema:
  product_name:
    type: string
    required: true
    label: Product / Service Name
    placeholder: "e.g. The Meridian at Downtown"

  product_description:
    type: text
    required: true
    label: Product Details
    placeholder: "Features, benefits, pricing, key selling points..."
    help: The product or service the email sequence promotes.

  target_audience:
    type: text
    required: true
    label: Target Audience
    placeholder: "Who receives these emails? What do they care about?"
    help: Describe the recipients — their needs, pain points, and motivations.

  sequence_length:
    type: integer
    required: false
    label: Number of Emails
    default: 5
    min: 3
    max: 12
    help: >
      How many emails in the sequence. Default 5 follows the proven arc:
      welcome -> value -> proof -> urgency -> final CTA.

  sequence_arc:
    type: select
    required: false
    label: Sequence Strategy
    default: "Welcome -> Value -> Proof -> Urgency -> CTA"
    options:
      - "Welcome -> Value -> Proof -> Urgency -> CTA"
      - "Education -> Problem -> Solution -> Proof -> CTA"
      - "Story -> Lesson -> Application -> Proof -> CTA"
      - "Custom"
    help: The narrative arc the sequence follows. Choose Custom to define your own.

  custom_arc:
    type: text
    required: false
    label: Custom Sequence Arc
    placeholder: "Describe your preferred email sequence flow..."
    help: Only used when sequence_arc is set to Custom.

  tone:
    type: select
    required: false
    label: Brand Tone
    default: Professional
    options:
      - Professional
      - Casual
      - Bold
      - Luxury
      - Down-to-earth

  cta_goal:
    type: select
    required: true
    label: Primary CTA Goal
    options:
      - Schedule a Tour
      - Request a Quote
      - Sign Up
      - Buy Now
      - Learn More
      - Contact Us
      - Download
    help: The action you want recipients to take.

  cta_url:
    type: string
    required: false
    label: CTA Destination URL
    placeholder: "https://..."

  sender_name:
    type: string
    required: false
    label: Sender Name
    placeholder: "e.g. Sarah from BlackTie"
    help: The from-name recipients see.

  brand_assets:
    type: file_upload
    required: false
    label: Brand Assets
    accept: "image/*"
    max_files: 5
    help: Logo, header images, brand photos.

  brand_colors:
    type: string
    required: false
    label: Brand Colors
    placeholder: "Primary: #1A2B3C, Accent: #FF6B35"

  special_instructions:
    type: text
    required: false
    label: Special Instructions
    placeholder: "Compliance requirements, specific offers, timing between emails..."

# ---------------------------------------------------------------------------
# Steps
# ---------------------------------------------------------------------------
steps:
  - id: strategy
    specialist: openclaw
    description: >
      Define the email sequence strategy. Based on the product, audience,
      and chosen arc, plan each email's role in the sequence:
        - Email purpose and goal
        - Key message and angle
        - Emotional state to evoke
        - CTA for this email
        - Timing (days after previous email)
      Research competitor email sequences if possible. Output a strategy
      document with the full sequence plan.

  - id: write
    specialist: openclaw
    depends_on: [strategy]
    description: >
      Write the copy for every email in the sequence. Each email includes:
        - Subject line (A variant and B variant)
        - Preheader text
        - Body copy (structured with headers, paragraphs, bullet points)
        - CTA button text
        - Plain-text version
      Maintain narrative continuity across the sequence. Each email should
      stand alone but reward sequential reading.
    rules:
      - A/B subject lines for every email
      - Preheader text (40-100 characters) for every email
      - Keep paragraphs short (2-3 sentences max)
      - One primary CTA per email
      - Plain-text fallback for every email

  - id: design
    specialist: openclaw
    depends_on: [write]
    description: >
      Build each email as complete HTML with inline CSS. Requirements:
        - Single-column layout, max-width 600px
        - Inline CSS (email client compatibility)
        - Mobile-responsive
        - Web-safe fonts with fallbacks
        - Images with alt text
        - Unsubscribe link placeholder
        - View-in-browser link placeholder
        - Preheader hidden text technique
      Test mental model: Gmail, Apple Mail, Outlook compatibility.
    rules:
      - Inline CSS only (no <style> blocks for critical styles)
      - Max-width 600px single column
      - Web-safe font stack
      - All images have alt text
      - Include unsubscribe placeholder
      - Table-based layout for Outlook compatibility

  - id: review
    type: approval_gate
    depends_on: [design]
    description: >
      Travis reviews the complete email sequence. Check narrative flow,
      copy quality, HTML rendering, and mobile responsiveness. Approve,
      request revisions, or reject.

# ---------------------------------------------------------------------------
# Output Schema
# ---------------------------------------------------------------------------
output_schema:
  strategy_document:
    type: object
    description: >
      Sequence strategy: purpose, timing, and messaging plan for each email.

  email_sequence:
    type: array
    description: >
      Array of email objects, each containing: subject_a, subject_b,
      preheader, body_html, body_text, cta_text, send_delay_days.

  preview_html:
    type: string
    description: >
      Single HTML page showing all emails in sequence for easy review.

# ---------------------------------------------------------------------------
# Metadata
# ---------------------------------------------------------------------------
metadata:
  author: Travis Hendrickson
  created: "2026-04-01"
  category: marketing
  estimated_duration: "1-2 hours"
  tags: [email, drip-sequence, nurture, html, marketing]
